name: CD

# The 'on: push' trigger is commented out to prevent automatic execution 
# and avoid unnecessary cloud costs (AWS ECR/Deployment).
# on:
#   push:
#     branches: [main]
#     tags: ['v*.*.*']

# Allows manual execution from the GitHub Actions tab if needed for testing.
on:
  workflow_dispatch:

jobs:
  # This job serves as a placeholder to indicate that CD is currently inactive.
  skip-deployment:
    name: Skip Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge
        run: |
          echo "Continuous Deployment is currently disabled."
          echo "Enable the 'on: push' trigger in this file when ready for AWS deployment."
