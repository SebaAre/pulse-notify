name: CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service:
          - gateway-service
          - notification-service
          - delivery-service
          - template-service
          - user-service
          - audit-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests -pl services/${{ matrix.service }} -am

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        run: |
          IMAGE=$ECR_REGISTRY/pulsenotify/${{ matrix.service }}:${{ github.sha }}
          docker build -t $IMAGE -f services/${{ matrix.service }}/Dockerfile services/${{ matrix.service }}
          docker push $IMAGE

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: bash scripts/deploy.sh staging ${{ github.sha }}

  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: bash scripts/deploy.sh prod ${{ github.sha }}
