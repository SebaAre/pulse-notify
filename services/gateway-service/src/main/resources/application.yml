server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes: []  # Routes configured in GatewayConfig.java
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8090/auth/realms/pulsenotify}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.pulsenotify: INFO
    org.springframework.cloud.gateway: DEBUG
